<!DOCTYPE html>

    <meta charset="UTF-8" />

    <!--
      GitHub Pages SPA redirect. When a deep link (e.g. /clanker/usage) 404s,
      public/404.html bounces it here with the path encoded in the query string;
      this restores the real path before the app boots. See:
      https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>
