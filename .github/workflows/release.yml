name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
  workflow_call:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: clanker
            asset_name: clanker-linux-amd64
          - os: macos-latest
            artifact_name: clanker
            asset_name: clanker-darwin-amd64
          - os: macos-14
            artifact_name: clanker
            asset_name: clanker-darwin-arm64
          - os: windows-latest
            artifact_name: clanker.exe
            asset_name: clanker-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .

      - name: Build with PyInstaller
        run: |
          pyinstaller clanker.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || inputs.version != ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release

          # Linux
          if [ -f artifacts/clanker-linux-amd64/clanker ]; then
            chmod +x artifacts/clanker-linux-amd64/clanker
            tar -czvf release/clanker-linux-amd64.tar.gz -C artifacts/clanker-linux-amd64 clanker
          fi

          # macOS Intel
          if [ -f artifacts/clanker-darwin-amd64/clanker ]; then
            chmod +x artifacts/clanker-darwin-amd64/clanker
            tar -czvf release/clanker-darwin-amd64.tar.gz -C artifacts/clanker-darwin-amd64 clanker
          fi

          # macOS ARM
          if [ -f artifacts/clanker-darwin-arm64/clanker ]; then
            chmod +x artifacts/clanker-darwin-arm64/clanker
            tar -czvf release/clanker-darwin-arm64.tar.gz -C artifacts/clanker-darwin-arm64 clanker
          fi

          # Windows
          if [ -f "artifacts/clanker-windows-amd64.exe/clanker.exe" ]; then
            cd artifacts/clanker-windows-amd64.exe
            zip ../../release/clanker-windows-amd64.zip clanker.exe
            cd ../..
          fi

          ls -la release/

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ inputs.version }}" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Clanker ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          generate_release_notes: true
          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
